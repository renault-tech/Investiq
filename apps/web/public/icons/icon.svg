<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Chart bars representing investments -->
  <rect x="80" y="340" width="64" height="92" rx="8" fill="#3B82F6" opacity="0.7"/>
  <rect x="168" y="280" width="64" height="152" rx="8" fill="#3B82F6" opacity="0.85"/>
  <rect x="256" y="220" width="64" height="212" rx="8" fill="#3B82F6"/>
  <rect x="344" y="160" width="64" height="272" rx="8" fill="#60A5FA"/>
  <!-- Trend line -->
  <polyline points="112,340 200,280 288,200 376,140" fill="none" stroke="#34D399" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="376" cy="140" r="14" fill="#34D399"/>
  <!-- IQ text at top -->
  <text x="256" y="120" font-family="system-ui,sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle">IQ</text>
</svg>
